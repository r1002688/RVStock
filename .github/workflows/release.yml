name: Build & Release RVStock

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Haal versienummer op uit csproj
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content "RVStock/RVStock.csproj"
          $version = $csproj.Project.PropertyGroup.Version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publiceer WPF app
        run: |
          dotnet publish RVStock/RVStock.csproj -c Release -r win-x64 --self-contained -o publish/

      - name: Installeer Velopack CLI
        run: dotnet tool install -g vpk

      - name: Maak Velopack installer
        run: |
          vpk pack `
            --packId RVStock `
            --packVersion ${{ steps.version.outputs.VERSION }} `
            --packDir publish/ `
            --mainExe RVStock.exe `
            --outputDir Releases/

      - name: Maak GitHub Release aan
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: RVStock v${{ steps.version.outputs.VERSION }}
          files: Releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
